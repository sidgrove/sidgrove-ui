name: Build + Purge jsDelivr

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "tsup.config.ts"
      - "tsconfig.json"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet || git commit -m "chore: rebuild dist/ [skip ci]"
          git push

      - name: Purge jsDelivr
        run: |
          curl -s "https://purge.jsdelivr.net/gh/sidgrove/sidgrove-ui@main/dist/glass.css" || true
          curl -s "https://purge.jsdelivr.net/gh/sidgrove/sidgrove-ui@main/dist/index.js" || true
          curl -s "https://purge.jsdelivr.net/gh/sidgrove/sidgrove-ui@main/dist/index.cjs" || true
